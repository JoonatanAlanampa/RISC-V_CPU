name: test
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install iverilog
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y iverilog

      # Set Python up and install cocotb
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python packages
        shell: bash
        run: pip install -r test/requirements.txt

      # Pinned so the bring-up script's board idioms are checked against real
      # shipping firmware code, not against a hand-written idea of it. Bump the
      # ref deliberately; a diff here is exactly the API drift we want to see.
      - name: Checkout tt-micropython-firmware (pinned)
        uses: actions/checkout@v6
        with:
          repository: TinyTapeout/tt-micropython-firmware
          # full SHA required: actions/checkout cannot fetch an abbreviated one
          ref: f34d9f0da5b0245de8bbd78e1cd3b3c4170408b9
          path: ttfw
          submodules: recursive

      - name: Bring-up script self-test (virtual demo board)
        env:
          TT_FIRMWARE_SRC: ttfw/microcotb/src
        run: python bringup/test_bringup_host.py

      - name: Run tests
        run: |
          cd test
          make clean
          make
          # make will return success even if the test fails, so check for failure in the results.xml
          ! grep failure results.xml

      - name: Test Summary
        uses: test-summary/action@v2.4
        with:
          paths: "test/results.xml"
        if: always()

      - name: upload waveform and test results
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test/tb.fst
            test/results.xml
            test/output/*
